<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Page</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #fff0f5, #ffe4e6);
    }
  </style>
</head>

<body class="p-5">

<!-- PRODUCT IMAGE -->
<div class="w-[300px] h-[300px] mx-auto">
  <img id="productimage" class="w-full h-full object-cover border-2 border-black mt-2"/>
</div>

<!-- PRODUCT INFO -->
<h3 id="productname" class="text-center text-xl font-bold mt-4"></h3>
<p id="productPrice" class="text-center text-xl font-semibold"></p>

<!-- ORDER FORM -->
<form id="orderform" class="w-[300px] mx-auto mt-6 space-y-4">

  <input
    type="text"
    id="customername"
    placeholder="Customer Name"
    class="border-2 border-pink-400 w-full p-2 rounded"
    required
  />

  <input
    type="tel"
    id="phone"
    placeholder="10-digit number"
    pattern="[0-9]{10}"
    maxlength="10"
    class="border-2 border-pink-400 w-full p-2 rounded"
    required
  />

  <textarea
    id="address"
    placeholder="Address"
    class="border-2 border-pink-400 w-full h-[120px] p-2 rounded resize-none"
    required
  ></textarea>

  <button type="submit" class="bg-pink-500 text-white w-full py-2 rounded">
    Submit Order
  </button>

</form>

<script>
/* ✅ FIXED KEYS (MATCH customer.html) */
const name = localStorage.getItem("product_name");
const price = localStorage.getItem("price");
const image = localStorage.getItem("image");

/* Show product */
document.getElementById("productname").innerText = name || "No product";
document.getElementById("productPrice").innerText = price ? "₹" + price : "";
document.getElementById("productimage").src = image || "";

/* Submit order */
document.getElementById("orderform").addEventListener("submit", function (e) {
  e.preventDefault();

  const customername = document.getElementById("customername").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  if (!customername || !phone || !address) {
    alert("Please fill all fields");
    return;
  }

  const order = {
    product: name,
    price: price,
    image: image,
    customername,
    phone,
    address,
    date: new Date().toISOString()
  };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order submitted successfully!");

  window.location.href = "customer.html";
});
</script>

</body>
</html>
